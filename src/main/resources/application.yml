spring:
  application:
    name: document-management

  datasource:
    url: jdbc:postgresql://localhost:5432/docmanagement
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: "3f8b2c1d9e4a7f6b0c5d2e1a8f3b9c4d7e0a1f2b5c8d3e6f9a0b1c2d3e4f5a6b"
  expiration: 86400000